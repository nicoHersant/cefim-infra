<VirtualHost *:80>
    ServerName nicoh.kptn.fr
    DocumentRoot /var/www/html/nicoh

    ErrorLog  /var/www/html/nicoh/logs/errors-kptn.fr.log
    CustomLog /var/www/html/nicoh/logs/access-kptn.fr.log combined

    RewriteEngine On
    <Directory /var/www/html/nicoh>
        AllowOverride All
        require all granted
        Options FollowSymLinks
    </Directory>
</VirtualHost>

<VirtualHost *:80>
   ServerName nicoh.kptn.fr
   Redirect permanent / https://nicoh.kptn.fr/
</VirtualHost>
<VirtualHost _default_:443>
  ServerName nicoh.kptn.fr
  DocumentRoot  /var/www/html/nicoh
  SSLEngine On
  SSLCertificateFile "/etc/letsencrypt/live/kptn.fr/fullchain.pem"
  SSLCertificateKeyFile "/etc/letsencrypt/live/kptn.fr/privkey.pem"
  #LogLevel info ssl:warn
  ErrorLog  /var/www/html/nicoh/logs/errors-kptn.fr.log
  CustomLog /var/www/html/nicoh/logs/access-kptn.fr.log combined

  <Directory /var/www/html/nicoh>
        Options FollowSymLinks
        AllowOverride Limit Options FileInfo
        # DirectoryIndex index.php
        Require all granted
    </Directory>
</VirtualHost>